    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase_init.js"></script>
    <script>
      // Inisialisasi Sidebar & Auth (Identik dengan Mapping ODP)
      document.addEventListener("DOMContentLoaded", () => {
        const menuToggle = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");
        const backdrop = document.getElementById("backdrop");

        if (menuToggle)
          menuToggle.addEventListener("click", () => {
            sidebar.classList.remove("-translate-x-full");
            backdrop.classList.replace("opacity-0", "opacity-50");
            backdrop.classList.remove("pointer-events-none");
          });
        if (backdrop)
          backdrop.addEventListener("click", () => {
            sidebar.classList.add("-translate-x-full");
            backdrop.classList.replace("opacity-50", "opacity-0");
            backdrop.classList.add("pointer-events-none");
          });

        // User Info
        const name = localStorage.getItem("userName");
        const username = localStorage.getItem("username");
        const role = (localStorage.getItem("userRole") || "user")
          .trim()
          .toLowerCase();

        if (name && username) {
          document.getElementById("user-display-name").textContent = name;
          document.getElementById("user-display-username").textContent =
            `@${username.toLowerCase()}`;
        } else {
          window.location.href = "login.html";
        }

        // Role Access
        if (role === "admin" || role === "administrator") {
          document.getElementById("upload-section").classList.remove("hidden");
        } else {
          document
            .querySelectorAll(".admin-only")
            .forEach((el) =>
              el.style.setProperty("display", "none", "important"),
            );
        }

        loadReports();
      });

      // 1. Load Arsip (Menampilkan Data)
      function loadReports() {
        const list = document.getElementById("file-list");
        list.innerHTML =
          '<div class="col-span-full text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-indigo-600"></i></div>';

        // Ambil role dan bersihkan (huruf kecil & hapus spasi)
        const rawRole = localStorage.getItem("userRole") || "user";
        const userRole = rawRole.trim().toLowerCase();

        db.collection("reports_archive")
          .orderBy("timestamp", "desc")
          .onSnapshot((snapshot) => {
            list.innerHTML = "";
            if (snapshot.empty) {
              list.innerHTML =
                '<div class="col-span-full bg-white p-10 rounded-2xl border-2 border-dashed border-gray-200 text-center text-gray-400">Belum ada arsip tersimpan.</div>';
              return;
            }

            snapshot.forEach((doc) => {
              const data = doc.data();
              const date = data.timestamp
                ? data.timestamp.toDate().toLocaleDateString("id-ID")
                : "...";
              const nameLower = data.fileName.toLowerCase();

              let icon = "fa-file-alt text-indigo-400";
              if (nameLower.includes("xls") || nameLower.includes("csv"))
                icon = "fa-file-excel text-green-500";
              if (nameLower.includes("pdf")) icon = "fa-file-pdf text-red-500";

              list.innerHTML += `
                    <div class="file-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between transition duration-300">
                        <div>
                            <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mb-4">
                                <i class="fas ${icon} text-2xl"></i>
                            </div>
                            <h4 class="font-bold text-gray-800 leading-snug mb-1 truncate" title="${data.fileName}">${data.fileName}</h4>
                            <div class="flex items-center gap-2 text-[10px] text-gray-400 font-bold uppercase tracking-tighter">
                                <span>${date}</span> • <span class="text-indigo-400">${data.uploadedBy}</span>
                            </div>
                        </div>
                        <div class="mt-6 flex items-center gap-2">
                            <a href="${data.fileURL}" target="_blank" class="flex-1 bg-indigo-600 text-white text-center py-3 rounded-xl text-[11px] font-black uppercase tracking-widest hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                                <i class="fas fa-download"></i> UNDUH FILE
                            </a>
                            ${
                              // Cek apakah admin atau administrator
                              userRole === "administrator" ||
                              userRole === "admin"
                                ? `<button onclick="deleteReport('${doc.id}')" class="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-red-500 transition" title="Hapus File">
                                    <i class="fas fa-trash-alt"></i>
                                </button>`
                                : ""
                            }
                        </div>
                    </div>
                `;
            });
          });
      }

      // 2. Upload Laporan Baru
      async function addReportLink() {
        const { value: file } = await Swal.fire({
          title: "Upload Laporan Baru",
          input: "file",
          inputAttributes: { accept: ".pdf,.xls,.xlsx" },
          showCancelButton: true,
          confirmButtonText: "Upload Sekarang",
          confirmButtonColor: "#4f46e5",
        });

        if (file) {
          Swal.fire({
            title: "Sedang Mengunggah...",
            html: "Mohon tunggu sebentar.",
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            },
          });

          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = async () => {
            const base64Data = reader.result.split(",")[1];
            try {
              const scriptUrl =
                "https://script.google.com/macros/s/AKfycbwNDQEgO-53HAbO2Esq-d5VlGy5Kz1QY91wJ9-RUT5SWVsz_6wUqvAreIuGPoUJ3TZvkQ/exec";

              // Kita kirim data ke Google
              const response = await fetch(scriptUrl, {
                method: "POST",
                body: JSON.stringify({
                  base64: base64Data,
                  type: file.type,
                  name: file.name,
                }),
              });

              // Menangkap respon balik dari Google
              const result = await response.json();

              if (result.status === "success") {
                // result.url berisi link "?export=download" dari Google Apps Script Anda
                await db.collection("reports_archive").add({
                  fileName: file.name,
                  uploadedBy: localStorage.getItem("userName") || "Admin",
                  fileURL: result.url, // LINK DIRECT DOWNLOAD
                  fileId: result.fileId,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                });

                Swal.fire(
                  "Berhasil!",
                  "File terupload dan bisa didownload langsung.",
                  "success",
                );
              } else {
                throw new Error(result.message);
              }
            } catch (error) {
              console.error(error);
              Swal.fire("Gagal", "Error: " + error.message, "error");
            }
          };
        }
      }

      // 3. Hapus Arsip
      async function deleteReport(docId) {
        const res = await Swal.fire({
          title: "Hapus File?",
          text: "File akan dihapus dari Website dan Google Drive.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          confirmButtonText: "Ya, Hapus!",
        });

        if (res.isConfirmed) {
          Swal.fire({
            title: "Sedang Menghapus...",
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            },
          });

          try {
            // 1. Ambil data fileId dari Firestore
            const docRef = db.collection("reports_archive").doc(docId);
            const docSnap = await docRef.get();
            const data = docSnap.data();

            // 2. Kirim perintah hapus ke Google Drive (HANYA JIKA ADA fileId)
            if (data && data.fileId) {
              // PASTIKAN URL DI BAWAH INI ADALAH URL SCRIPT ANDA YANG ASLI
              const scriptUrl =
                "https://script.google.com/macros/s/AKfycbwNDQEgO-53HAbO2Esq-d5VlGy5Kz1QY91wJ9-RUT5SWVsz_6wUqvAreIuGPoUJ3TZvkQ/exec";

              await fetch(scriptUrl, {
                method: "POST",
                // Menggunakan mode no-cors agar tidak terhalang kebijakan browser saat delete
                mode: "no-cors",
                body: JSON.stringify({
                  action: "delete",
                  fileId: data.fileId,
                }),
              });
            }

            // 3. Hapus data dari Firestore
            await docRef.delete();

            Swal.fire(
              "Terhapus!",
              "File telah dibuang ke sampah Google Drive.",
              "success",
            );
          } catch (error) {
            console.error("Delete Error:", error);
            Swal.fire(
              "Gagal",
              "Terjadi kesalahan saat menghapus: " + error.message,
              "error",
            );
          }
        }
      }

      // 4. Logout
      window.handleLogout = function () {
        Swal.fire({
          title: "Logout?",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          confirmButtonText: "Ya",
        }).then((res) => {
          if (res.isConfirmed) {
            localStorage.clear();
            window.location.href = "login.html";
          }
        });
      };
    </script>

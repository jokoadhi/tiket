        .content-area {
            transition: margin-left 0.3s ease-in-out;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .content-area { margin-left: 16rem; }
        }

        /* --- OLT WINDOW MANAGER STYLES --- */
        #desktop-area {
            flex-grow: 1;
            position: relative;
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            overflow: hidden;
            border-radius: 12px;
            margin: 0 1rem 1rem 1rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .winbox {
            position: absolute;
            width: 600px;
            height: 400px;
            background: #f8fafc;
            border: 1px solid #475569;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            z-index: 10;
            touch-action: none;
        }

        .winbox-header {
            background: linear-gradient(to bottom, #475569, #334155);
            color: #f8fafc;
            padding: 8px 12px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .winbox-content { flex-grow: 1; position: relative; overflow: hidden; background: white; }
        .iframe-wrapper { width: 1280px; height: 800px; transform-origin: top left; position: absolute; top: 0; left: 0; }
        iframe { width: 100% !important; height: 100% !important; border: none; }
        .win-overlay { position: absolute; inset: 0; display: none; z-index: 100; }
        .resizing .win-overlay, .dragging .win-overlay { display: block; }
    </style>

    <script>
        // --- SIDEBAR & USER DATA LOGIC ---
        document.addEventListener("DOMContentLoaded", () => {
            const menuToggle = document.querySelector("#menu-toggle");
            const sidebar = document.querySelector("#sidebar");
            const backdrop = document.querySelector("#backdrop");

            const name = localStorage.getItem("userName");
            const userHeader = localStorage.getItem("username");
            if (name && userHeader) {
                document.getElementById("user-display-name").textContent = name;
                document.getElementById("user-display-username").textContent = `@${userHeader.toLowerCase()}`;
            }

            function closeSidebar() {
                sidebar.classList.add("-translate-x-full");
                backdrop.classList.add("opacity-0", "pointer-events-none");
            }
            function openSidebar() {
                sidebar.classList.remove("-translate-x-full");
                backdrop.classList.remove("opacity-0", "pointer-events-none");
                backdrop.classList.add("opacity-50");
            }
            menuToggle.addEventListener("click", () => sidebar.classList.contains("-translate-x-full") ? openSidebar() : closeSidebar());
            backdrop.addEventListener("click", closeSidebar);
        });

        window.handleLogout = function () {
            Swal.fire({
                title: "Logout?", icon: "warning", showCancelButton: true, confirmButtonColor: "#ef4444", confirmButtonText: "Ya, Logout",
            }).then((result) => {
                if (result.isConfirmed) { localStorage.clear(); window.location.href = "login.html"; }
            });
        };

        // --- WINDOW MANAGER LOGIC ---
        let zIndexCounter = 100;
        let cascadeOffset = 40;
        const VIRTUAL_WIDTH = 1280;

        function createWindow(title, url) {
            const desktop = document.getElementById('desktop-area');
            const winId = 'win-' + Math.random().toString(36).substr(2, 9);
            const win = document.createElement('div');
            win.id = winId; win.className = 'winbox';
            win.style.left = cascadeOffset + 'px'; win.style.top = cascadeOffset + 'px';
            win.style.zIndex = ++zIndexCounter;
            cascadeOffset += 20; if(cascadeOffset > 150) cascadeOffset = 40;

            win.innerHTML = `
                <div class="winbox-header" onmousedown="bringToFront('${winId}')">
                    <span>${title}</span>
                    <button class="hover:bg-red-500 px-1 rounded transition" onclick="document.getElementById('${winId}').remove()">✕</button>
                </div>
                <div class="winbox-content">
                    <div class="win-overlay"></div>
                    <div id="wrapper-${winId}" class="iframe-wrapper"><iframe src="${url}"></iframe></div>
                </div>`;
            desktop.appendChild(win);
            updateScale(winId);
            makeInteractable(winId);
        }

        function updateScale(id) {
            const win = document.getElementById(id);
            const wrapper = document.getElementById('wrapper-' + id);
            if (!win || !wrapper) return;
            const scale = win.offsetWidth / VIRTUAL_WIDTH;
            wrapper.style.transform = `scale(${scale})`;
        }

        function bringToFront(id) { document.getElementById(id).style.zIndex = ++zIndexCounter; }

        function makeInteractable(id) {
            const el = document.getElementById(id);
            let posX = 0, posY = 0;
            interact(el).draggable({
                allowFrom: '.winbox-header',
                listeners: {
                    start(event) { event.target.classList.add('dragging'); bringToFront(id); },
                    move(event) { posX += event.dx; posY += event.dy; event.target.style.transform = `translate(${posX}px, ${posY}px)`; },
                    end(event) { event.target.classList.remove('dragging'); }
                }
            }).resizable({
                edges: { right: true, bottom: true },
                modifiers: [ interact.modifiers.aspectRatio({ ratio: 'preserve', equalDelta: false }) ],
                listeners: {
                    start(event) { event.target.classList.add('resizing'); bringToFront(id); },
                    move(event) {
                        event.target.style.width = event.rect.width + 'px';
                        event.target.style.height = event.rect.height + 'px';
                        updateScale(id);
                    },
                    end(event) { event.target.classList.remove('resizing'); }
                }
            });
        }
    </script>

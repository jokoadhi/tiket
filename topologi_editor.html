<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberMaxs Topology Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
      #paper-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
        cursor: grab;
      }
      #paper-container:active {
        cursor: grabbing;
      }

      #paper-container.delete-mode-active {
        cursor:
          url("https://cdn-icons-png.flaticon.com/24/3096/3096673.png") 12 12,
          auto !important;
      }
      #paper-container.delete-mode-active .joint-element {
        cursor: pointer !important;
      }

      .joint-paper {
        border: none !important;
      }
      aside::-webkit-scrollbar {
        width: 4px;
      }
      aside::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .swal2-popup {
        font-size: 0.85rem !important;
        font-family: sans-serif !important;
        border-radius: 1rem !important;
      }
    </style>
  </head>
  <body
    class="h-screen flex flex-col overflow-hidden bg-slate-100 font-sans text-sm text-slate-900"

        </h1>
      </div>

          class="text-xs text-slate-400 bg-slate-800 px-3 py-1.5 rounded-md"

        <button
          id="btn-delete-mode"
          onclick="toggleDeleteMode()"
          class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-md transition duration-150 border border-slate-600"
        >
          Mode Hapus: <span id="status-delete" class="font-bold">OFF</span>

        <button

            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export PNG
        </button>

        <!-- Tambahkan ini di dalam header, dekat tombol Export PNG -->
        <button
          onclick="saveTopology()"
          class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-md transition duration-150 flex items-center gap-1 shadow-md"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
            />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />

          Simpan ke Cloud
        </button>

        <button
          onclick="clearAll()"
          class="text-xs bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white px-3 py-1.5 rounded-md transition duration-150"
        >
          Hapus Semua
        </button>
      </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase_init.js"></script>

    <script>
      const namespace = joint.shapes;
      const graph = new joint.dia.Graph({}, { namespace });
      const container = document.getElementById("paper-container");

      const paper = new joint.dia.Paper({
        el: container,
        model: graph,
        width: "100%",
        height: "100%",
        gridSize: 10,
        drawGrid: { name: "dot", color: "#cbd5e1" },
        background: { color: "#f8fafc" },
        interactive: { linkLabels: true, vertexAdd: false },
        defaultLink: new joint.shapes.standard.Link({
          attrs: { line: { stroke: "#64748b", strokeWidth: 2 } },
        }),
        snapLinks: { radius: 50 },
        linkPinning: false,
        cellViewNamespace: namespace,
      });

      // FUNGSI EXPORT KE GAMBAR (PERBAIKAN)
      function exportToImage() {
        // Sembunyikan grid dengan mengubah opacity dot menjadi transparan
        paper.options.drawGrid.color = "transparent";
        paper.drawGrid();

        const el = paper.svg;

        Swal.fire({
          title: "Sedang Memproses...",
          text: "Menyiapkan gambar topologi Anda",
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
          },
        });

        htmlToImage
          .toPng(el)
          .then(function (dataUrl) {
            // Kembalikan warna grid ke semula
            paper.options.drawGrid.color = "#cbd5e1";
            paper.drawGrid();

            const link = document.createElement("a");
            link.download =
              "Topologi-FiberMaxs-" + new Date().getTime() + ".png";
            link.href = dataUrl;
            link.click();
            Swal.fire({
              icon: "success",
              title: "Export Berhasil!",
              timer: 1500,
              showConfirmButton: false,
            });
          })
          .catch(function (error) {
            paper.options.drawGrid.color = "#cbd5e1";
            paper.drawGrid();
            Swal.fire("Gagal!", "Tidak bisa mengekspor gambar.", "error");
          });
      }

      // LOGIKA MODE HAPUS
      let isDeleteMode = false;
      function toggleDeleteMode() {
        isDeleteMode = !isDeleteMode;
        const btn = document.getElementById("btn-delete-mode");
        const status = document.getElementById("status-delete");

        if (isDeleteMode) {
          btn.classList.replace("bg-slate-700", "bg-red-600");
          btn.classList.replace("hover:bg-slate-600", "hover:bg-red-700");
          status.innerText = "ON";
          container.classList.add("delete-mode-active");
        } else {
          btn.classList.replace("bg-red-600", "bg-slate-700");
          btn.classList.replace("hover:bg-red-700", "hover:bg-slate-600");
          status.innerText = "OFF";
          container.classList.remove("delete-mode-active");
        }
      }

      // EVENT KLIK UNTUK HAPUS
      paper.on("element:pointerclick", function (elementView) {
        if (isDeleteMode) {
          const name = elementView.model.attr("label/text");
          Swal.fire({
            title: "Hapus Perangkat?",
            text: `Hapus "${name}"?`,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ef4444",
            confirmButtonText: "Ya, Hapus",
            cancelButtonText: "Batal",
          }).then((res) => {
            if (res.isConfirmed) elementView.model.remove();
          });
        }
      });

      // ZOOM & PAN
      let currentScale = 1;
      const zoomStatus = document.getElementById("zoom-status");
      paper.on("blank:mousewheel", (evt, x, y, delta) => {
        evt.preventDefault();
        currentScale = Math.min(Math.max(0.5, currentScale + delta * 0.1), 2);
        paper.scale(currentScale, currentScale, 0, 0);
        zoomStatus.innerText = "Zoom: " + Math.round(currentScale * 100) + "%";
      });

      let dragStart;
      paper.on("blank:pointerdown", (evt) => {
        if (!isDeleteMode) dragStart = { x: evt.clientX, y: evt.clientY };
      });
      $(container)
        .on("mousemove", (evt) => {
          if (dragStart) {
            const cur = paper.translate();
            paper.translate(
              cur.tx + (evt.clientX - dragStart.x),
              cur.ty + (evt.clientY - dragStart.y),
            );
            dragStart = { x: evt.clientX, y: evt.clientY };
          }
        })
        .on("mouseup", () => (dragStart = null));

      // ADD DEVICE (4 PORT)
      function addDevice(label, color) {
        const rect = new joint.shapes.standard.Rectangle();
        rect.position(150 + Math.random() * 100, 100 + Math.random() * 100);
        rect.resize(100, 55);
        rect.attr({
          body: {
            fill: "white",
            stroke: color,
            strokeWidth: 2,
            rx: 8,
            ry: 8,
            filter: {
              name: "dropShadow",
              args: { dx: 1, dy: 1, blur: 2, opacity: 0.1 },
            },
          },
          label: {
            text: label,
            fill: "#1e293b",
            fontSize: 10,
            fontWeight: "700",
            fontFamily: "sans-serif",
            refX: 0.5,
            refY: 0.5,
            textAnchor: "middle",
            yAlignment: "middle",
          },
        });

        rect.prop("ports/groups", {
          top: {
            position: "top",
            attrs: {
              circle: {
                fill: color,
                r: 4.5,
                magnet: true,
                stroke: "#fff",
                strokeWidth: 2,
              },
            },
          },
          bottom: {
            position: "bottom",
            attrs: {
              circle: {
                fill: color,
                r: 4.5,
                magnet: true,
                stroke: "#fff",
                strokeWidth: 2,
              },
            },
          },
          left: {
            position: "left",
            attrs: {
              circle: {
                fill: color,
                r: 4.5,
                magnet: true,
                stroke: "#fff",
                strokeWidth: 2,
              },
            },
          },
          right: {
            position: "right",
            attrs: {
              circle: {
                fill: color,
                r: 4.5,
                magnet: true,
                stroke: "#fff",
                strokeWidth: 2,
              },
            },
          },
        });

        rect.addPorts([
          { id: "t", group: "top" },
          { id: "b", group: "bottom" },
          { id: "l", group: "left" },
          { id: "r", group: "right" },
        ]);

        rect.addTo(graph);
      }

      graph.on("add", function (cell) {
        if (cell.isLink()) {
          cell.appendLabel({
            attrs: {
              text: {
                text: "EDIT DISINI",
                fill: "#ffffff",
                fontSize: 9,
                fontWeight: "bold",
                pointerEvents: "none",
              },
              rect: {
                fill: "#3b82f6",
                stroke: "#2563eb",
                strokeWidth: 1.5,
                rx: 4,
                ry: 4,
                width: 70,
                height: 18,
                cursor: "pointer",
              },
            },
          });
          const tools = new joint.dia.ToolsView({
            tools: [
              new joint.linkTools.Vertices(),
              new joint.linkTools.Remove({
                distance: 15,
                action: function (evt, linkView) {
                  Swal.fire({
                    title: "Hapus kabel?",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#3b82f6",
                    confirmButtonText: "Ya, Hapus",
                  }).then((res) => {
                    if (res.isConfirmed) linkView.model.remove();
                  });
                },
              }),
            ],
          });
          cell.findView(paper).addTools(tools).hideTools();
        }
      });

      paper.on("link:pointerdblclick", function (linkView) {
        const currentText = linkView.model.label(0).attrs.text.text;
        const newText = prompt("Masukkan Label Baru:", currentText);
        if (newText)
          linkView.model.label(0, { attrs: { text: { text: newText } } });
      });

      paper.on("link:mouseenter", (lv) => lv.showTools());
      paper.on("link:mouseleave", (lv) => lv.hideTools());

      paper.on("element:pointerdblclick", function (ev) {
        if (isDeleteMode) return;
        const n = prompt("Nama Perangkat:", ev.model.attr("label/text"));
        if (n) ev.model.attr("label/text", n);
      });

      // --- LOGIKA FIREBASE ---

      // Fungsi Simpan ke Firestore
      async function saveTopology() {
        const urlParams = new URLSearchParams(window.location.search);
        const topoId = urlParams.get("id");

        if (!topoId) {
          Swal.fire(
            "ID Tidak Ditemukan",
            "Pastikan membuka editor melalui list topologi.",
            "error",
          );
          return;
        }

        try {
          // JointJS sangat mudah di-export ke JSON string
          const canvasData = JSON.stringify(graph.toJSON());

          await db.collection("topology_maps").doc(topoId).update({
            canvas_data: canvasData,
            updated_at: firebase.firestore.FieldValue.serverTimestamp(),
          });

          Swal.fire({
            icon: "success",
            title: "Tersimpan!",
            text: "Topologi berhasil diperbarui di database.",
            timer: 1000,
            showConfirmButton: false,
          });
        } catch (e) {
          console.error("Save Error:", e);
          Swal.fire("Gagal", "Gagal menyimpan: " + e.message, "error");
        }
      }

      async function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const topoId = urlParams.get("id");
        if (!topoId) return;

        try {
          const doc = await db.collection("topology_maps").doc(topoId).get();
          if (doc.exists) {
            const data = doc.data();

            // Set judul jika ada
            if (data.company_name) {
              // Gunakan ID yang spesifik agar tidak merusak elemen h1 lain jika ada
              const titleEl =
                document.getElementById("company-title") ||
                document.querySelector("h1");
              titleEl.innerHTML = `Topology <span class="text-blue-400 text-xs">${data.company_name.toUpperCase()}</span>`;
            }

            // Import data ke graph JointJS
            if (data.canvas_data) {
              const parsedData = JSON.parse(data.canvas_data);

              // --- VALIDASI FORMAT DATA ---
              // Jika data memiliki properti 'cells', berarti itu format JointJS
              if (parsedData && parsedData.cells) {
                graph.fromJSON(parsedData);
              }
              // Jika data memiliki properti 'drawflow', itu data lama (abaikan/reset)
              else if (parsedData && parsedData.drawflow) {
                console.warn(
                  "Data Drawflow lama terdeteksi. Silakan buat topologi baru dan klik Simpan.",
                );
                // Opsional: tampilkan toast pemberitahuan
                Swal.fire({
                  toast: true,
                  position: "top-end",
                  icon: "info",
                  title: "Data format lama direset",
                  showConfirmButton: false,
                  timer: 3000,
                });
                // Jangan panggil graph.fromJSON agar tidak error
              }
            }
          }
        } catch (e) {
          console.error("Load Error:", e);
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        await loadData();

        // Jika setelah load data graph masih kosong, tambahkan router default
        if (graph.getCells().length === 0) {
          addDevice("Router", "#3b82f6");
        }
      });

      function clearAll() {
        Swal.fire({
          title: "Reset?",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          confirmButtonText: "Ya, Bersihkan",
        }).then((res) => {
          if (res.isConfirmed) graph.clear();
        });
      }

      addDevice("Router", "#3b82f6");
    </script>
  </body>
</html>

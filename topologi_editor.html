<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor Topologi - Report App</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.js"></script>

    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg-main: #f8fafc;
        --text-dark: #1e293b;
        --dfLineColor: #4f46e5;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-main);
        color: var(--text-dark);
      }

      /* --- CANVAS STYLE --- */
      #drawflow {
        width: 100%;
        height: calc(100vh - 80px);
        background-color: var(--bg-main);
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 30px 30px;
      }

      /* --- SVG KABEL --- */
      #drawflow svg {
        z-index: 10 !important;
        position: absolute;
        overflow: visible !important;
      }

      /* --- NODE HARDWARE --- */
      .drawflow-node {
        background: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 10px !important;
        width: 110px !important;
        min-height: 80px !important;
        padding: 8px !important;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05) !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 5 !important;
      }

      /* Matikan interaksi bodi agar tidak mengganggu klik titik biru */
      .drawflow-node .drawflow_content_node {
        pointer-events: none !important;
        user-select: none;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* --- RESET KONTAINER TITIK (SOLUSI TITIK MENUMPUK) --- */
      .drawflow-node .inputs,
      .drawflow-node .outputs {
        position: absolute !important;
        width: 100% !important;
        height: 100% !important;
        top: 0 !important;
        left: 0 !important;
        display: block !important; /* Mematikan flexbox default Drawflow */
        pointer-events: none !important;
        z-index: 100 !important;
      }

      /* --- GAYA TITIK BULAT --- */
      .drawflow-node .input,
      .drawflow-node .output {
        position: absolute !important;
        width: 14px !important;
        height: 14px !important;
        background: var(--primary) !important;
        border: 2px solid #ffffff !important;
        pointer-events: all !important;
        z-index: 200 !important;
        border-radius: 50% !important;
        cursor: crosshair;
        box-sizing: border-box !important;
        margin: 0 !important; /* Reset margin default */
      }

      /* --- POSISI PRESISI 4 SISI --- */

      /* 1. INPUT: TEPAT TENGAH ATAS */
      .drawflow-node .input {
        top: 0 !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }

      /* 2. OUTPUT 1: TEPAT TENGAH KIRI */
      .drawflow-node .outputs .output:nth-child(1) {
        top: 50% !important;
        left: 0 !important;
        transform: translate(-50%, -50%) !important;
      }

      /* 3. OUTPUT 2: TEPAT TENGAH KANAN */
      .drawflow-node .outputs .output:nth-child(2) {
        top: 50% !important;
        left: 100% !important;
        transform: translate(-50%, -50%) !important;
      }

      /* 4. OUTPUT 3: TEPAT TENGAH BAWAH */
      .drawflow-node .outputs .output:nth-child(3) {
        top: 100% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }

      /* STYLE KABEL */
      .drawflow .connection .main-path {
        stroke: var(--dfLineColor) !important;
        stroke-width: 3px !important;
      }

      /* --- SIDEBAR & UI --- */
      .sidebar-label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 1.25rem;
        padding-left: 8px;
        border-left: 3px solid var(--primary);
      }

      .device-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: #ffffff;
        border: 1px solid #f1f5f9;
        border-radius: 10px;
        cursor: grab;
        transition: all 0.2s ease;
        margin-bottom: 8px;
      }

      .device-item:hover {
        border-color: var(--primary);
        background-color: #f8faff;
        transform: translateX(4px);
      }

      .device-item .icon-box {
        width: 32px;
        height: 32px;
        background: #f1f5f9;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
      }

      .device-item span.text {
        font-size: 11px;
        font-weight: 700;
        color: #475569;
        text-transform: uppercase;
      }

      /* NOTE STYLE - FINAL CENTERED VERSION */
      .drawflow-node.note {
        background: transparent !important;
        border: 1px solid transparent !important;
        box-shadow: none !important;
        transition: border 0.2s ease;
        min-width: 140px !important;
        min-height: 80px !important;
        /* Tambahkan ini agar kontainer induk menengahkan kontennya */
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      .drawflow-node.note:focus-within {
        border: 1px dashed #cbd5e1 !important;
      }

      .drawflow-node.note .drawflow_content_node {
        pointer-events: all !important;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .drawflow-node.note .inputs,
      .drawflow-node.note .outputs {
        display: none !important;
      }

      .note-text {
        font-size: 14px;
        font-style: italic;
        color: #4b5563;
        padding: 10px;
        outline: none;
        cursor: text !important;
        /* KUNCI CENTER: Membuat teks rata tengah dan fleksibel */
        text-align: center;
        width: 100%;
        display: inline-block;
        word-wrap: break-word;
      }

      .note-text:empty:before {
        content: "Tulis catatan...";
        color: #cbd5e1;
      }
    </style>
  </head>
  <body class="overflow-hidden">
    <header
      class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-50 relative shadow-sm"
    >
      <div class="flex items-center space-x-6">
        <a
          href="topologi_list.html"
          class="p-2.5 hover:bg-slate-50 rounded-xl text-slate-400 border border-slate-100 transition-all"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
        </a>
        <div>
          <h1
            id="company-title"
            class="text-xl font-bold text-slate-800 tracking-tight uppercase"
          >
            Memuat...
          </h1>
          <div class="flex items-center gap-2">
            <span
              class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"
            ></span>
            <p
              class="text-[10px] text-slate-400 font-bold tracking-widest uppercase"
            >
              Live Editor
            </p>
          </div>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <button
          onclick="addManualNote()"
          class="flex items-center gap-2 bg-amber-50 text-amber-600 px-4 py-2 rounded-lg font-bold text-xs border border-amber-100 hover:bg-amber-100 transition-all"
        >
          <span>📝</span> NOTE
        </button>
        <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
        <div
          class="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-3 h-[38px]"
        >
          <span class="text-[9px] font-bold mr-3 text-slate-400 uppercase"
            >Kabel</span
          >
          <input
            type="color"
            id="line-color"
            value="#4f46e5"
            class="w-5 h-5 border-none bg-transparent cursor-pointer"
          />
        </div>
        <button
          onclick="exportPNG()"
          class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-xs hover:bg-slate-900 transition-all shadow-sm"
        >
          📥 PNG
        </button>
        <button
          onclick="saveTopology()"
          class="flex items-center gap-2 bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold text-xs hover:bg-indigo-700 transition-all shadow-md shadow-indigo-100"
        >
          💾 SIMPAN
        </button>
      </div>
    </header>

    <div class="flex">
      <aside
        class="w-64 bg-white border-r border-slate-200 h-screen p-5 flex flex-col overflow-y-auto pb-32"
      >
        <span class="sidebar-label">Hardware List</span>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="router"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-router"></i></div>
          <span class="text">Router</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="switch"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-hdd-network"></i></div>
          <span class="text">Switch</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="olt"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-diagram-3"></i></div>
          <span class="text">OLT</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="ap"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-broadcast-pin"></i></div>
          <span class="text">Access Point</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="htb"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-arrow-left-right"></i></div>
          <span class="text">Media Conv</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="server"
          class="device-item group"
        >
          <div class="icon-box">
            <i class="bi bi-pc-display-horizontal"></i>
          </div>
          <span class="text">Server</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="pc"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-laptop"></i></div>
          <span class="text">Client PC</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="nvr"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-camera-video"></i></div>
          <span class="text">NVR / DVR</span>
        </div>
        <div
          draggable="true"
          ondragstart="drag(event)"
          data-node="cloud"
          class="device-item group"
        >
          <div class="icon-box"><i class="bi bi-cloud-check"></i></div>
          <span class="text">Internet</span>
        </div>
      </aside>

      <main
        class="flex-1 relative"
        ondrop="drop(event)"
        ondragover="allowDrop(event)"
      >
        <div id="drawflow"></div>
      </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase_init.js"></script>

    <script>
      let editor;
      const idContainer = document.getElementById("drawflow");

      window.allowDrop = (ev) => ev.preventDefault();

      window.drag = (ev) => {
        const nodeType = ev.target
          .closest("[data-node]")
          .getAttribute("data-node");
        ev.dataTransfer.setData("node", nodeType);
      };

      window.drop = (ev) => {
        ev.preventDefault();
        const nodeType = ev.dataTransfer.getData("node");
        const templates = {
          router: { icon: "bi bi-router", title: "Router" },
          switch: { icon: "bi bi-hdd-network", title: "Switch" },
          olt: { icon: "bi bi-diagram-3", title: "OLT" },
          ap: { icon: "bi bi-broadcast-pin", title: "Access Point" },
          htb: { icon: "bi bi-arrow-left-right", title: "Media Conv" },
          server: { icon: "bi bi-pc-display-horizontal", title: "Server" },
          pc: { icon: "bi bi-laptop", title: "Client PC" },
          nvr: { icon: "bi bi-camera-video", title: "NVR / DVR" },
          cloud: { icon: "bi bi-cloud-check", title: "Internet" },
        };

        const template = templates[nodeType];
        if (template) {
          const rect = idContainer.getBoundingClientRect();
          let x = (ev.clientX - rect.left) / editor.zoom;
          let y = (ev.clientY - rect.top) / editor.zoom;

          // MENYESUAIKAN JUMLAH PORT: 1 Input (Atas), 3 Output (Lainnya)
          editor.addNode(
            nodeType,
            1,
            3,
            x - 55,
            y - 40,
            nodeType,
            {},
            `<div class="flex flex-col items-center justify-center p-1">
                <i class="${template.icon} text-2xl text-indigo-600 mb-1"></i>
                <div class="text-[9px] font-bold text-center uppercase text-slate-500 leading-tight">${template.title}</div>
            </div>`,
          );
        }
      };

      window.addManualNote = () => {
        editor.addNode(
          "note",
          0,
          0,
          150,
          150,
          "note",
          {},
          `<div class="note-text" contenteditable="true" spellcheck="false"></div>`,
        );
      };

      document.getElementById("line-color").addEventListener("input", (e) => {
        document.documentElement.style.setProperty(
          "--dfLineColor",
          e.target.value,
        );
      });

      window.exportPNG = () => {
        const canvas = document.getElementById("drawflow");
        const originalBG = canvas.style.backgroundImage;
        canvas.style.backgroundImage = "none";
        html2canvas(canvas, { backgroundColor: "#f8fafc", scale: 2 }).then(
          (c) => {
            const link = document.createElement("a");
            link.download = `Topologi_${document.getElementById("company-title").innerText}.png`;
            link.href = c.toDataURL();
            link.click();
            canvas.style.backgroundImage = originalBG;
          },
        );
      };

      window.saveTopology = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const topoId = urlParams.get("id");
        if (!topoId) return;
        try {
          await db
            .collection("topology_maps")
            .doc(topoId)
            .update({
              canvas_data: JSON.stringify(editor.export()),
              updated_at: firebase.firestore.FieldValue.serverTimestamp(),
            });
          Swal.fire({
            icon: "success",
            title: "Tersimpan!",
            timer: 800,
            showConfirmButton: false,
          });
        } catch (e) {
          Swal.fire("Gagal", e.message, "error");
        }
      };

      document.addEventListener("DOMContentLoaded", async () => {
        editor = new Drawflow(idContainer);
        editor.curvature = 0.5;
        editor.reroute = true;
        editor.start();

        // --- LOGIKA LIMIT 10 KABEL ---
        editor.on("connectionCreated", function (connection) {
          const nodeIn = editor.getNodeFromId(connection.input_id);
          const nodeOut = editor.getNodeFromId(connection.output_id);

          // Cek jumlah kabel di input tujuan
          const inputName = connection.input_class;
          const countIn = nodeIn.inputs[inputName].connections.length;

          // Cek jumlah kabel di output asal
          const outputName = connection.output_class;
          const countOut = nodeOut.outputs[outputName].connections.length;

          if (countIn > 10 || countOut > 10) {
            editor.removeSingleConnection(
              connection.output_id,
              connection.input_id,
              outputName,
              inputName,
            );
            Swal.fire({
              toast: true,
              position: "top-end",
              icon: "warning",
              title: "Limit 10 kabel tercapai!",
              showConfirmButton: false,
              timer: 1500,
            });
          }
        });

        await loadData();

        // Debugging UX
        editor.on("connectionCancel", () => {
          Swal.fire({
            toast: true,
            position: "bottom-end",
            icon: "info",
            title: "Tarik ke titik biru di ATAS perangkat tujuan",
            showConfirmButton: false,
            timer: 1500,
          });
        });
      });

      async function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const topoId = urlParams.get("id");
        if (!topoId) return;
        const doc = await db.collection("topology_maps").doc(topoId).get();
        if (doc.exists) {
          const data = doc.data();
          document.getElementById("company-title").innerText =
            data.company_name || "Topologi Jaringan";
          if (data.canvas_data) editor.import(JSON.parse(data.canvas_data));
        }
      }
    </script>
  </body>
</html>

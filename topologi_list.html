    <div class="content-area">
      <header class="sticky top-0 bg-white shadow-md p-4 mb-8 z-30">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <button
              class="p-2 rounded-md hover:bg-gray-100 transition md:hidden"
              id="menu-toggle"
            >
              <svg
                class="w-6 h-6 text-indigo-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16m-7 6h7"
                ></path>
              </svg>
            </button>
            <h1 class="text-xl md:text-2xl font-extrabold text-gray-800">
              Dokumentasi <span class="text-indigo-600">Topologi</span>
            </h1>
          </div>

          <div
            class="flex items-center space-x-3 border-l pl-4 border-gray-100"
          >
            <div class="text-right hidden sm:block">
              <p
                id="user-display-name"
                class="text-sm font-bold text-gray-800 leading-none capitalize"
              >
                Loading...
              </p>
              <p
                id="user-display-username"
                class="text-[14px] font-medium text-indigo-400 mt-1"
              >
                @username
              </p>
            </div>
            <button
              onclick="handleLogout()"
              class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition duration-200"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div
          class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8"
        >
          <div class="relative flex-1">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                ></path>
              </svg>
            </span>
            <input
              type="text"
              id="search-topology"
              onkeyup="filterTopology()"
              placeholder="Cari nama instansi..."
              class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-150 sm:text-sm shadow-sm"
            />
          </div>
          <button
            onclick="tambahPerusahaan()"
            class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-sm font-bold rounded-xl shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-all"
          >
            + Tambah Topologi Baru
          </button>
        </div>

        <div
          id="topology-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"
        >
          <div class="col-span-full text-center py-20 text-gray-400 italic">
            Memuat basis data topologi...
          </div>
        </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase_init.js"></script>

    <script>
      // 1. Inisialisasi Koleksi
      const topoCollection = db.collection("topology_maps");

      // 2. Logika Sidebar & Header (Sama persis dengan dashboard kamu)
      document.addEventListener("DOMContentLoaded", () => {
        const menuToggle = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");
        const backdrop = document.getElementById("backdrop");

        function closeSidebar() {
          sidebar.classList.add("-translate-x-full");
          backdrop.classList.remove("opacity-50");
          backdrop.classList.add("opacity-0", "pointer-events-none");
        }
        function openSidebar() {
          sidebar.classList.remove("-translate-x-full");
          backdrop.classList.remove("opacity-0", "pointer-events-none");
          backdrop.classList.add("opacity-50");
        }
        if (menuToggle)
          menuToggle.addEventListener("click", () =>
            sidebar.classList.contains("-translate-x-full")
              ? openSidebar()
              : closeSidebar(),
          );
        if (backdrop) backdrop.addEventListener("click", closeSidebar);

        // User Display
        const name = localStorage.getItem("userName");
        const username = localStorage.getItem("username");
        if (name && username) {
          document.getElementById("user-display-name").textContent = name;
          document.getElementById("user-display-username").textContent =
            `@${username.toLowerCase()}`;
        } else {
          window.location.href = "login.html";
        }

        loadTopologyList();
      });

      // 3. Load Data dari Firestore
      async function loadTopologyList() {
        const grid = document.getElementById("topology-grid");

        topoCollection.orderBy("updated_at", "desc").onSnapshot((snapshot) => {
          if (snapshot.empty) {
            grid.innerHTML = `
              <div class="col-span-full text-center py-16 bg-white rounded-3xl border-2 border-dashed border-gray-200">
                <p class="text-gray-400 font-medium">Belum ada data topologi tersimpan.</p>
              </div>`;
            return;
          }

          grid.innerHTML = "";
          snapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.updated_at
              ? new Date(data.updated_at.toDate()).toLocaleDateString("id-ID", {
                  day: "numeric",
                  month: "short",
                  year: "numeric",
                })
              : "-";

            grid.innerHTML += `
  <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 card-topo group relative flex flex-col justify-between">
    <div>
        <div class="flex items-start justify-between mb-4">
            <div class="p-3 bg-indigo-50 rounded-2xl text-indigo-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                </svg>
            </div>
            <button onclick="hapusTopology('${doc.id}', '${data.company_name}')" class="text-gray-300 hover:text-red-500 transition">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
        <h3 class="text-xl font-black text-gray-800 uppercase leading-tight mb-1 truncate">${data.company_name}</h3>
        <p class="text-xs text-indigo-400 font-bold mb-6 italic">Update: ${date}</p>
    </div>
    
    <div class="space-y-2">
        <!-- TOMBOL UTAMA: VIEW -->
        <a href="topologi_view.html?id=${doc.id}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-xs hover:bg-emerald-600 transition shadow-lg shadow-emerald-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            VIEW TOPOLOGI
        </a>

        <div class="flex gap-2">
            <a href="topologi_editor.html?id=${doc.id}" target="_blank" class="flex-1 bg-indigo-600 text-white text-center py-3 rounded-xl font-bold text-[10px] hover:bg-indigo-700 transition">
                BUKA EDITOR
            </a>
            <button onclick="editNama('${doc.id}', '${data.company_name}')" class="px-4 bg-gray-100 text-gray-500 py-3 rounded-xl font-bold text-[10px] hover:bg-gray-200 transition">
                RENAME
            </button>
        </div>
    </div>
  </div>`;
          });
        });
      }

      // 4. Fungsi Tambah
      window.tambahPerusahaan = async function () {
        const { value: name } = await Swal.fire({
          title: "Perusahaan Baru",
          input: "text",
          inputPlaceholder: "Masukkan nama perusahaan...",
          showCancelButton: true,
          confirmButtonColor: "#4338ca",
          customClass: { popup: "rounded-[2rem]" },
        });

        if (name) {
          await topoCollection.add({
            company_name: name,
            canvas_data: null,
            created_at: firebase.firestore.FieldValue.serverTimestamp(),
            updated_at: firebase.firestore.FieldValue.serverTimestamp(),
          });
        }
      };

      // 5. Fungsi Update Nama
      window.editNama = async function (id, oldName) {
        const { value: newName } = await Swal.fire({
          title: "Ubah Nama",
          input: "text",
          inputValue: oldName,
          showCancelButton: true,
          confirmButtonColor: "#4338ca",
          customClass: { popup: "rounded-[2rem]" },
        });
        if (newName && newName !== oldName) {
          await topoCollection.doc(id).update({
            company_name: newName,
            updated_at: firebase.firestore.FieldValue.serverTimestamp(),
          });
        }
      };

      // 6. Fungsi Hapus
      window.hapusTopology = async function (id, name) {
        const confirm = await Swal.fire({
          title: "Hapus Data?",
          text: `Topologi ${name} akan dihapus permanen.`,
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          customClass: { popup: "rounded-[2rem]" },
        });
        if (confirm.isConfirmed) await topoCollection.doc(id).delete();
      };

      // 7. Logout (Sama dengan dashboard kamu)
      window.handleLogout = function () {
        Swal.fire({
          title: "Logout?",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          confirmButtonText: "Ya, Keluar",
        }).then((result) => {
          if (result.isConfirmed) {
            localStorage.clear();
            window.location.href = "login.html";
          }
        });
      };
    </script>
  </body>
</html>
